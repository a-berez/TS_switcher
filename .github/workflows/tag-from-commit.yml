name: Create tag from version commit

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-tag-from-commit:
    if: startsWith(github.event.head_commit.message, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if commit message is version
        id: prepare
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Last commit message: '$COMMIT_MSG'"

          # Проверяем формат vX.Y.Z
          if [[ ! "$COMMIT_MSG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Commit message is not a version tag, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$COMMIT_MSG"
          echo "Detected version: $VERSION"
          PLAIN_VERSION="${VERSION#v}"
          PLAIN_VERSION="${VERSION#v}"

          git fetch --tags

          # Если тег уже существует, просто отмечаем, что релиз всё равно можно создать
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, will reuse it."
          else
            echo "Creating tag $VERSION at $GITHUB_SHA"
            git tag "$VERSION" "$GITHUB_SHA"
            git push origin "$VERSION"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plain_version=$PLAIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.prepare.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build extension
        if: steps.prepare.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: python build.py

      - name: Extract release notes from README
        if: steps.prepare.outputs.should_release == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          python - << 'PY'
          import os, re, pathlib

          version = os.environ["VERSION"].lstrip("v")
          readme = pathlib.Path("README.md").read_text(encoding="utf-8")

          pattern = rf"### Версия {re.escape(version)}\n((?:.|\n)*?)(?:\n### Версия |\n## |\Z)"
          m = re.search(pattern, readme)
          # Если блок для этой версии не найден, оставляем описание пустым,
          # чтобы релиз создался без текста.
          notes = (m.group(1).strip() if m else "")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("body<<EOF\n")
              f.write(notes)
              f.write("\nEOF\n")
          PY

      - name: Append full changelog link
        if: steps.prepare.outputs.should_release == 'true'
        id: changelog_link
        env:
          BODY: ${{ steps.changelog.outputs.body }}
          VERSION: ${{ steps.prepare.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          body="$BODY"
          version="$VERSION"

          # Пытаемся найти предыдущий тег (предполагается семантика vX.Y.Z)
          prev_tag=$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || echo "")

          if [ -n "$prev_tag" ]; then
            line="Full Changelog: \`${prev_tag}...${version}\`"
            if [ -n "$body" ]; then
              printf '%s\n\n%s\n' "$body" "$line" > body_with_link.txt
            else:
              printf '%s\n' "$line" > body_with_link.txt
            fi
          else:
            printf '%s\n' "$body" > body_with_link.txt
          fi

          {
            echo 'body<<EOF'
            cat body_with_link.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepare AMO metadata (ru release notes)
        if: steps.prepare.outputs.should_release == 'true'
        env:
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          python - << 'PY'
          import json
          import os
          from pathlib import Path

          body = os.environ.get("BODY", "").strip()

          if body:
              data = {
                  "version": {
                      "release_notes": {
                          "ru": body
                      }
                  }
              }
          else:
              data = {}

          Path("amo_metadata.json").write_text(
              json.dumps(data, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Sign and upload Firefox add-on to AMO
        if: steps.prepare.outputs.should_release == 'true'
        continue-on-error: true
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: TS_switcher-${{ steps.prepare.outputs.plain_version }}-firefox.zip
          channel: listed
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}
          metaDataFile: amo_metadata.json
          timeout: 900000

      - name: Create GitHub Release
        if: steps.prepare.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.version }}
          body: ${{ steps.changelog_link.outputs.body }}
          generate_release_notes: false
          files: |
            TS_switcher-*-chromium.zip
            TS_switcher-chromium.zip
            TS_switcher-*-firefox.zip
            TS_switcher-firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
